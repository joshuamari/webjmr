<!DOCTYPE html>
<html lang="en">
  <head>
    <title>MH Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css" />
    <link rel="stylesheet" href="css/mhreport.css" />
    <link rel="stylesheet" href="css/boxicons.css" />
    <script src="js/jquery.js"></script>
    <script src="js/jquery.inview.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.table2excel.js"></script>
    <script>
      var busterCall = ["js/newmain.js", "css/mhreport.css"];
      $.post(
        "php/get_version.php",
        {
          busterCall: busterCall,
          titleName: "MH Report",
        },
        function (data) {
          $("head").html(data);
        }
      );
    </script>
  </head>

  <body>
    <div class="home-content position-relative">
      <div class="title xPrint">
        <h1>MH Report Table</h1>

        <a href="../" class="backbtn">
          <i class="bx bx-left-arrow-alt fs-5"></i>
          <h5 style="font-weight: 400; font-size: 17px">Back to Reports</h5>
        </a>
      </div>
      <div class="content">
        <div class="upper py-3">
          <div class="row left pe-md-2">
            <div class="form-floating col-12 col-sm-4 col-xl-2 my-1 my-md-0">
              <select class="form-select" id="buSel" aria-label="Select BU">
                <option value="" selected hidden>Select Group</option>
                <option>ENV</option>
                <option>Two</option>
                <option>Three</option>
              </select>
              <label for="busSel">Select BU</label>
            </div>
            <div class="form-floating col-12 col-sm-4 col-xl-2 my-1 my-md-0">
              <select class="form-select" id="CO" aria-label="Select Cut-off">
                <option value="3">Monthly</option>
                <option value="1">First Half</option>
                <option value="4">Previous Week</option>
                <option value="5">Current Week</option>
                <!-- <option value="2">Second Half</option> -->
              </select>
              <label for="CO" class="">Select Cut-off</label>
            </div>
            <div
              class="form-floating col-12 col-sm-4 col-xl-2 my-1 my-md-0"
              id="monthSelContainer"
            >
              <input type="month" id="monthSel" class="form-control" />
              <label for="monthSel">Select Month</label>
            </div>
          </div>

          <div class="right pe-2 pe-lg-0">
            <button
              id="btnPrint"
              class="xPrint btn btn-primary"
              style="background-color: #395dc7"
            >
              PRINT
            </button>
            <button id="btnExport" class="xPrint btn btn-outline-success">
              EXPORT
            </button>
          </div>
        </div>

        <div class="lower">
          <!-- <table data-cols-width="10,10,10" id="mainTable" class="table table-hover ayos"> -->
          <table id="mainTable" class="table table-hover ayos"></table>
        </div>
      </div>
    </div>
  </body>
</html>
