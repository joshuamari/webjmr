<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Daily Monitoring Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css" />
    <link rel="stylesheet" href="css/dmr.css" />
    <link rel="stylesheet" href="css/boxicons.css" />
    <script src="js/jquery.js"></script>
    <script src="js/jquery.inview.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.table2excel.js"></script>
    <script>
      var busterCall = ["js/main.js", "css/dmr.css", "css/bootstrap.min.css"];
      $.post(
        "ajax/get_version.php",
        {
          busterCall: busterCall,
          titleName: "Daily Monitoring Report",
        },
        function (data) {
          $("head").html(data);
        }
      );
    </script>
  </head>

  <body>
    <div class="home-content position-relative">
      <div class="title xPrint">
        <h1>Daily Monitoring Report</h1>

        <div class="d-flex justify-content-between align-items-center">
          <a href="../" class="backbtn">
            <i class="bx bx-left-arrow-alt fs-5"></i>
            <h5 style="font-weight: 400; font-size: 17px">Back to Reports</h5>
          </a>

          <div class="right d-flex flex-row pe-2 pe-lg-0">
            <button
              id="btnPrint"
              class="xPrint btn btn-primary"
              style="background-color: #395dc7"
            >
              PRINT
            </button>
            <button id="btnExport" class="xPrint btn btn-success">
              EXPORT
            </button>
          </div>
        </div>
      </div>
      <div class="bg-dark-subtle d-flex" style="padding: 10px">
        <div class="form-floating col-12 col-md-4 col-lg-2">
          <input type="month" id="monthSel" class="form-control" />
          <label for="monthSel">Select Month</label>
        </div>
      </div>
      <div class="content d-flex flex-column position-relative">
        <div
          id="upperT"
          class="position-relative"
          style="padding: 20px 20px 0 20px"
        >
          <div
            class="position-relative col-12 mt-2 overflow-auto"
            style="height: calc(100vh - 534px)"
          >
            <table id="main-table" class="table">
              <thead id="main-thead">
                <tr id="headrow">
                  <th>Job Request Description</th>
                  <th>Item of Works (Dwg. No.)</th>
                  <th>Drawing / Document Name</th>
                  <th>KHI in Charge</th>
                  <th>Name</th>
                  <th>KHI Request Date</th>
                  <th>KDT Deadline</th>
                  <th>Start Date</th>
                  <th>Manhour Used</th>
                  <th id="status">Status</th>
                </tr>
              </thead>
              <tbody id="main-tbody"></tbody>
            </table>
          </div>
        </div>
        <div
          id="lowerT"
          class="position-relative bg-dark-subtle"
          style="padding: 20px"
        >
          <div class="form-floating col-12 col-md-4 mb-2 d-flex">
            <input type="week" id="weekSel" class="form-control" />
            <label for="weekSel">Highlight Week</label>
            <button id="clearWeek" class="btn btn-primary" style="width: 70%">
              Clear Week
            </button>
          </div>
          <div
            id="weekly-div"
            class=""
            style="width: 100%; overflow: auto; height: 220px"
          >
            <table id="weekly-report" class="table" style="display: none">
              <thead>
                <tr id="weekly-headrow">
                  <th>Employee Name</th>
                  <th></th>
                  <th title="Planning / Actual Percentage">P/A %</th>
                  <th id="w-total">TOTAL</th>
                </tr>
              </thead>
              <tbody id="weekly-body"></tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- <div
        class="noShow p-2 w-100 h-100 d-flex justify-content-center align-items-center position-relative"
      >
        <h1 class="text-center">Select Employee</h1>
      </div> -->
    </div>
  </body>
</html>
