    var busterCall = ["js/main.js", "css/dmr.css", "css/bootstrap.min.css"];
    $.post(
      "ajax/get_version.php",
      {
        busterCall: busterCall,
        titleName: "Drawing Monitoring Report",
      },
      function (data) {
        $("head").html(data);

    );

<body>
  <div class="home-content position-relative">
    <div class="title xPrint">
      <h1>Drawing Monitoring Report</h1>

      <div class="d-flex justify-content-between align-items-center">

        <div class="form-floating col-12 mb-2">
          <select class="form-select" id="buSel" aria-label="Select BU">
            <option value="" selected hidden>Select Group</option>
            <option>ENV</option>
            <option>Two</option>
            <option>Three</option>
          </select>
          <label for="busSel">Select BU</label>
        </div>
        <div class="form-floating col-12 mb-2">
          <input type="month" id="monthSel" class="form-control" />
          <label for="monthSel">Select Month</label>
        </div>
        <div class="form-floating col-12 mb-4">
          <select class="form-select" id="projSel" aria-label="Select Project">
            <option value="">All</option>
            <option value="1">Project1</option>
            <!-- <option value="2">Second Half</option> -->
          </select>
          <label for="projSel" class="">Select Project</label>
        </div>

        <div class="position-relative memcont">

          <div id="members-list"></div>
          <button id="selAll" class="btn btn-primary w-100 mt-3">
            Select All

      </div>
      <div id="mainContent" class="content rightt d-flex flex-column position-relative d-none">
        <div id="upperT" class="position-relative" style="padding: 20px 20px 0 20px">
          <div class="position-relative col-12 mt-2 overflow-auto" style="height: calc(100vh - 446px)">
            <table id="main-table" class="table" data-cols-width="20,25,40,15,20,10,10,10,10,10,10">
              <thead id="main-thead">
                <tr data-height="20" id="headrow">
                  <th data-b-a-s="thin" data-f-bold="true">Job Request Description</th>
                  <th data-b-a-s="thin" data-f-bold="true">Item of Works (Dwg. No.)</th>
                  <th data-b-a-s="thin" data-f-bold="true">Drawing / Document Name</th>
                  <th data-b-a-s="thin" data-f-bold="true">KHI in Charge</th>
                  <th data-b-a-s="thin" data-f-bold="true">Name</th>
                  <th data-b-a-s="thin" data-f-bold="true">KHI Request Date</th>
                  <th data-b-a-s="thin" data-f-bold="true">KDT Deadline</th>
                  <th data-b-a-s="thin" data-f-bold="true">Start Date</th>
                  <th data-b-a-s="thin" data-f-bold="true">Manhour Used</th>
                  <th data-b-a-s="thin" data-f-bold="true" id="status">Status</th>
                  <th data-b-a-s="thin" id="poa"></th>
                </tr>
              </thead>
              <tbody id="main-tbody"></tbody>
            </table>
          </div>
        </div>
        <div id="lowerT" class="position-relative" style="padding: 20px">
          <div class="btn-group" role="group" aria-label="Basic example">
            <button type="button" id="GroupRep" class="repSel btn btn-secondary">Group</button>
            <button type="button" id="MemberRep" class="repSel btn btn-secondary">Members</button>
          </div>
          <div id="wb-div" style="display: none;">
            <div id="cleardiv" class="form-floating col-12 col-md-4 mb-2 d-flex">
              <input type="week" id="weekSel" class="form-control" />
              <label for="weekSel">Highlight Week</label>
              <button id="clearWeek" class="btn btn-primary" style="width: 70%">
                Clear Week
              </button>
            </div>

          </div>
          <div id="weekly-div" class="" style="width: 100%; overflow: auto; height: 190px;">
            <table id="weekly-report" class="table" style="display: none">
              <thead>
                <tr id="weekly-headrow">
                  <th data-b-a-s="thin" data-f-bold="true">Employee Name</th>
                  <th data-b-a-s="thin" data-f-bold="true"></th>
                  <th data-b-a-s="thin" data-f-bold="true" title="Planning / Actual Percentage">P/A %</th>
                  <th data-b-a-s="thin" data-f-bold="true" id="w-total">TOTAL</th>
                </tr>
              </thead>
              <tbody id="weekly-body"></tbody>
            </table>
            <table id="weekly-group-summary" class="table" style="display:none;">
              <thead>
                <tr id="tr-group-1">
                  <th data-b-a-s="thin" data-f-bold="true" rowspan="2" class="c1-label">予実</th>
                </tr>
                <tr id="tr-group-2">

                </tr>
              </thead>
              <tbody id="weekly-body">
                <tr id="data-plan">
                  <th data-b-a-s="thin" data-f-bold="true" class="c1-label">予定</th>
                </tr>
                <tr id="data-actual">
                  <th data-b-a-s="thin" data-f-bold="true" class="c1-label">実際</th>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
