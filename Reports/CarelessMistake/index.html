<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Careless Mistakes Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css" />
    <link rel="stylesheet" href="css/careless.css" />
    <link rel="stylesheet" href="css/boxicons.css" />
    <script src="js/jquery.js"></script>
    <script src="js/jquery.inview.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.table2excel.js"></script>
    <script>
      var busterCall = ["js/careless.js", "css/careless.css"];
      $.post(
        "ajax/get_version.php",
        {
          busterCall: busterCall,
          titleName: "MH Report",
        },
        function (data) {
          $("head").html(data);
        }
      );
    </script>
  </head>

  <body>
    <div class="home-content position-relative">
      <div class="title xPrint">
        <h1>Careless Mistakes Report</h1>

        <div class="d-flex justify-content-between align-items-center">
          <a href="../" class="backbtn">
            <i class="bx bx-left-arrow-alt fs-5"></i>
            <h5 style="font-weight: 400; font-size: 17px">Back to Reports</h5>
          </a>
          <div class="right pe-2 pe-lg-0">
            <button
              id="btnPrint"
              class="xPrint btn btn-primary"
              style="background-color: #395dc7"
            >
              PRINT
            </button>
            <button id="btnExport" class="xPrint btn btn-success">
              EXPORT
            </button>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="left col-md-3 col-lg-2 col-12 p-3 px-lg-4">
          <div class="form-floating col-12 mb-2">
            <select class="form-select" id="buSel" aria-label="Select BU">
              <option value="" selected hidden>Select Group</option>
              <option>ENV</option>
              <option>Two</option>
              <option>Three</option>
            </select>
            <label for="busSel">Select BU</label>
          </div>
          <div class="form-floating col-12 mb-2">
            <input type="date" id="startSel" class="form-control" />
            <label for="startSel">Select Start Date</label>
          </div>
          <div class="form-floating col-12 mb-2">
            <input type="date" id="endSel" class="form-control" />
            <label for="endSel">Select End Date</label>
          </div>
          <div class="form-floating col-12 mb-4">
            <select
              class="form-select"
              id="projSel"
              aria-label="Select Project"
            >
              <option value="0">ALL</option>
              <option value="1">Project1</option>
              <!-- <option value="2">Second Half</option> -->
            </select>
            <label for="projSel" class="">Select Project</label>
          </div>

          <div class="position-relative">
            <h4 class="">Members</h4>
            <div class="col-12">
              <div class="form-check form-switch p-0 d-flex">
                <input
                  type="checkbox"
                  role="switch"
                  class="checkbox"
                  name="checkbox"
                />
                <div class="d-flex align-items-center">
                  <p class="m-0 ps-3">
                    Orig group only
                    <!-- <i
                      class="m-0 bx bx-info-circle ps-1"
                      title="Exclude Other Group's Project"
                    ></i> -->
                  </p>
                </div>
              </div>
            </div>
            <div id="members-list"></div>
            <button id="selAll" class="btn btn-primary w-100 mt-4">
              Select All
            </button>
          </div>
        </div>

        <div class="lower">
          <!-- <table data-cols-width="10,10,10" id="mainTable" class="table table-hover ayos"> -->
          <table id="mainTable" class="table table-hover ayos"></table>
        </div>
      </div>
    </div>
  </body>
</html>
