<!DOCTYPE html>

<head>
  <title>Monthly Standard Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="css/font-awesome.css">
  <link rel="stylesheet" href="css/msreport.css" />
  <link rel="stylesheet" href="css/boxicons.css" />
  <script src="js/jquery.js"></script>
  <script src="js/jquery.inview.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery.table2excel.js"></script>
  <script>

    var busterCall = ["js/main.js", "css/msreport.css"];
    $.post("ajax/get_version.php", {
      busterCall: busterCall,
      titleName: "Monthly Standard Report"
    },
      function (data) {
        $('head').html(data);
      }
    );

  </script>
</head>

<body>
  <h1>Monthly Standard (DONE!!!)</h1>
  <input type="month" id="monthSel">
  <select id="buSel">
      <option>SYS</option>
      <option>ENV</option>
      <option>BOI</option>
  </select>
  <div class="row">
      <div class="col p-4" id="members-list">
          <h3 id="members-label">Members <button id="selAll" class="btn btn-primary">Select All</button></h3>
      </div>
      <div class="col row">
          <div id="upperT" class="row" style="overflow-x: auto;">
              <table class="table" id="mainTable">
                  <thead>
                      <tr id="mainThead"></tr>
                  </thead>
                  <tbody id="mainTbody"></tbody>
              </table>
          </div>
          <div id="lowerT" class="row" style="overflow-x: auto;">
              <table class="table" id="subTable">
                  <thead>
                      <tr id="subThead"></tr>
                  </thead>
                  <tbody id="subTbody"></tbody>
              </table>
          </div>
      </div>
  </div>




</body>

</html>
