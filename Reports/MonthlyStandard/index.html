<!doctype html>
<html lang="en">
  <head>
    <title>Monthly Standard Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css" />
    <link rel="stylesheet" href="css/msreport.css" />
    <link rel="stylesheet" href="css/boxicons.css" />
    <link rel="stylesheet" href="../../tailwindcss/output.css" />
    <script src="js/jquery.js"></script>
    <script src="js/jquery.inview.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.table2excel.js"></script>
    <script src="js/main.js"></script>
  </head>

  <body>
    <div class="home-content position-relative">
      <div class="title xPrint">
        <h1>Monthly Standard Report</h1>

        <div class="d-flex justify-content-between align-items-center">
          <a href="../" class="backbtn">
            <i class="bx bx-left-arrow-alt fs-5"></i>
            <h5 style="font-weight: 400; font-size: 17px">Back to Reports</h5>
          </a>

          <div class="right d-flex flex-row pe-2 pe-lg-0">
            <button
              id="btnPrint"
              class="xPrint btn btn-primary"
              style="background-color: #395dc7"
            >
              PRINT
            </button>
            <button id="btnExport" class="xPrint btn btn-success">
              EXPORT
            </button>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="lower position-relative d-flex flex-md-row flex-column">
          <div class="left p-3 shadow-lg">
            <div class="form-floating col-12 mb-2">
              <select
                class="form-select"
                id="locSel"
                aria-label="Select Location"
              >
                <option>KDT</option>
                <option>Kobe</option>
                <option>WFH</option>
              </select>
              <label for="busSel">Select Location</label>
            </div>
            <div class="form-floating col-12 mb-2">
              <select class="form-select" id="buSel" aria-label="Select BU">
                <option value="" selected hidden>Select Group</option>
                <option>ENV</option>
                <option>Two</option>
                <option>Three</option>
              </select>
              <label for="busSel">Select BU</label>
            </div>
            <div class="form-floating col-12 mb-2">
              <input type="month" id="monthSel" class="form-control" />
              <label for="monthSel">Select Month</label>
            </div>
            <div class="form-floating col-12 mb-2">
              <select class="form-select" id="CO" aria-label="Select BU">
                <option value="3">Monthly</option>
                <option value="1">First Half</option>
                <!-- <option value="2">Second Half</option> -->
              </select>
              <label for="CO" class="">Select Cut-off</label>
            </div>
            <div class="col-12 mb-4">
              <div class="form-check form-switch p-0 d-flex">
                <input
                  type="checkbox"
                  role="switch"
                  class="checkbox"
                  name="checkbox"
                />
                <div class="d-flex align-items-center">
                  <p class="m-0 ps-3">
                    Include OGP<i
                      class="m-0 bx bx-info-circle ps-1"
                      title="Include Other Group's Project"
                    ></i>
                  </p>
                </div>
              </div>
            </div>

            <div class="position-relative mb-3 mb-lg-0">
              <h4 class="">Members</h4>
              <div id="members-list"></div>
              <button id="selAll" class="btn btn-primary w-100 mt-4">
                Select All
              </button>
            </div>
            <div
              class="col-12 position-relative d-flex justify-content-center align-items-center"
            >
              <div
                class="position-absolute justify-content-center align-items-center tog"
                title="Hide selections"
              >
                <i
                  class="bx bx-chevron-up position-relative fs-1 fw-semibold"
                  style="color: var(--main-blue)"
                ></i>
              </div>
            </div>
          </div>
          <div class="right d-none d-flex flex-column lower">
            <div id="upperT" class="position-relative mt-2">
              <table
                class="table position-relative ayos bg-white table-hover table-striped"
                id="mainTable"
              >
                <thead>
                  <tr id="mainThead" class="sticky-top bg-body"></tr>
                </thead>
                <tbody id="mainTbody"></tbody>
              </table>
            </div>
            <div id="lowerT" class="position-relative">
              <table
                class="table ayos bg-white table-hover table-striped"
                id="subTable"
              >
                <thead>
                  <tr id="subThead"></tr>
                </thead>
                <tbody id="subTbody"></tbody>
              </table>
            </div>
          </div>
          <div
            class="noShow p-2 h-100 d-flex justify-content-center align-items-center position-relative"
          >
            <h1 class="text-center">Select Employee</h1>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
