<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Accounting Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css" />
    <link rel="stylesheet" href="css/accounting.css" />
    <link rel="stylesheet" href="css/boxicons.css" />
    <script src="js/jquery.js"></script>
    <script src="js/jquery.inview.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/xlsx.js"></script>
    <script src="js/jquery.table2excel.js"></script>
    <script>
      var busterCall = [
        "js/acct.js",
        "css/accounting.css",
        "css/bootstrap.min.css",

      ];
      $.post(
        "ajax/get_version.php",
        {
          busterCall: busterCall,
          titleName: "Accounting Report",
        },
        function (data) {
          $("head").html(data);
        }
      );
    </script>
  </head>

  <!-- #region modal -->

  <!-- #endregion modal-->

  <body>
    <div class="home-content position-relative">
      <div class="title xPrint">
        <h1>Accounting Report</h1>

        <div class="d-flex justify-content-between align-items-center">
          <a href="../" class="backbtn">
            <i class="bx bx-left-arrow-alt fs-5"></i>
            <h5 style="font-weight: 400; font-size: 17px">Back to Reports</h5>
          </a>
          <div class="right pe-2 pe-lg-0 d-flex">
            <!-- <button
              id="btnPrint"
              class="xPrint btn btn-primary"
              style="background-color: #395dc7"
            >
              PRINT
            </button> -->
            <button id="btnExport" class="xPrint btn btn-success">
              EXPORT
            </button>
          </div>
        </div>
      </div>
      <div class="content d-flex flex-column">
        <div
          class="left col-12 p-3 px-lg-3 d-flex flex-column flex-sm-row gap-sm-2 gap-0"
        >
          <div class="form-floating col-12 col-lg-2 col-md-3 col-sm-4 mb-2">
            <select
              class="form-select"
              id="selLoc"
              aria-label="Select Location"
            >
            
            </select>
            <label for="selLoc">Select Location</label>
          </div>

          <div class="form-floating col-12 col-lg-2 col-md-3 col-sm-4 mb-2">
            <input type="month" id="monthSel" class="form-control" />
            <label for="monthSel">Select Month</label>
          </div>

          <div class="form-floating col-12 col-lg-2 col-md-3 col-sm-4 mb-2">
            <select class="form-select" id="co" aria-label="Select Cut-off">
              <option value=0>Monthly</option>
              <option value=1>First half</option>
              <option value=2>Second Half</option>
            </select>
            <label for="co">Select Cut-off</label>
          </div>
        </div>

        <div class="tablecont col-12 p-3">
          <div class="mainTable overflow-auto">
            
          </div>
        </div>
       
      </div>
    </div>
  </body>
</html>
